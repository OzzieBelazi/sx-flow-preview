<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes" />
<title>Agent OS — Spec-Driven Development Loop</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" />
<style>
  :root {
    --bg:#0f1117; --panel:#1b1f29; --panel2:#252b38; --border:#2e3548;
    --txt:#e8ecf3; --muted:#9aa3b2;
    --H:#ff8c1a; --A:#b366ff; --S:#3ddc84; --G:#4da6ff; --M:#3dc8d4; --W:#7a8294; --F:#ff5a5f; --P:#3ddc84;
    --accent:#4da6ff;
  }
  *{box-sizing:border-box}
  html,body,#root{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .tabs{position:absolute;top:8px;left:8px;right:8px;z-index:25;display:flex;gap:6px;flex-wrap:wrap;background:rgba(15,17,23,.85);backdrop-filter:blur(8px);padding:6px;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.45);}
  .tab{flex:1 1 130px;min-height:44px;padding:6px 10px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);font-size:13px;cursor:pointer;text-align:center;font-weight:500;line-height:1.2;}
  .tab:active{transform:scale(.97);}
  .tab.active{background:linear-gradient(180deg,#3a3f52,#2a2f3e);border-color:#5b6480;box-shadow:inset 0 0 0 1px var(--accent);}
  .tab small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px;}

  .player{position:absolute;top:108px;left:8px;right:8px;z-index:24;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);padding:8px 10px;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;gap:6px;}
  .player .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn{min-width:42px;min-height:36px;padding:6px 10px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);font-size:14px;cursor:pointer;font-weight:600;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,#3a86ff,#2c6bd9);border-color:#5b9dff;color:#fff;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .player select{background:var(--panel2);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;}
  .progress{height:6px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border);}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--S),var(--G),var(--A));transition:width .4s ease;}
  .step-label{font-size:12.5px;color:var(--txt);line-height:1.35;}
  .step-label .num{color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;margin-right:6px;}
  .scen-desc{font-size:12px;color:var(--muted);line-height:1.35;}

  .legend{position:absolute;bottom:10px;left:8px;z-index:20;background:rgba(15,17,23,.85);backdrop-filter:blur(8px);padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:11.5px;display:flex;gap:8px;flex-wrap:wrap;}
  .legend .chip{display:inline-flex;align-items:center;gap:5px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}

  .info{position:absolute;right:8px;top:8px;z-index:30;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;max-width:300px;font-size:13px;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .info h4{margin:0 0 6px;font-size:14px;display:flex;align-items:center;gap:6px;}
  .info .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;color:#0f1117;}
  .info p{margin:6px 0 0;color:var(--muted);}
  .info .close{position:absolute;top:6px;right:8px;background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;}

  .node-box{padding:8px 10px;border-radius:8px;border:1.5px solid;background:var(--panel);color:var(--txt);font-size:12px;line-height:1.25;min-width:140px;max-width:220px;text-align:center;cursor:pointer;transition:opacity .25s,filter .25s,box-shadow .25s;}
  .node-box:hover{filter:brightness(1.15);}
  .node-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px;margin-bottom:4px;color:#0f1117;}
  .node-label{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;}
  .node-H{border-color:var(--H);} .tag-H{background:var(--H);}
  .node-A{border-color:var(--A);} .tag-A{background:var(--A);}
  .node-S{border-color:var(--S);} .tag-S{background:var(--S);}
  .node-G{border-color:var(--G);} .tag-G{background:var(--G);}
  .node-M{border-color:var(--M);} .tag-M{background:var(--M);}
  .node-W{border-color:var(--W);} .tag-W{background:var(--W);}
  .node-F{border-color:var(--F);} .tag-F{background:var(--F);color:#fff;}
  .node-P{border-color:var(--P);} .tag-P{background:var(--P);}
  .node-pending{opacity:.25;}
  .node-active{animation:pulse 1.2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(77,166,255,.7);}
  .node-done{opacity:1;filter:saturate(.85);}
  .node-done::after{content:"✓";position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--P);color:#0f1117;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1;}
  .node-box{position:relative;}
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(77,166,255,.55); }
    70%  { box-shadow: 0 0 0 12px rgba(77,166,255,0);   }
    100% { box-shadow: 0 0 0 0   rgba(77,166,255,0);   }
  }
  .react-flow__edge.pending path{stroke-opacity:.18;}
  .react-flow__edge.active path{stroke-width:3px;}
  .react-flow__edge.done path{stroke-opacity:.95;}
  .react-flow__attribution{background:transparent!important;color:var(--muted)!important;font-size:10px;}
  @media (max-width:640px){
    .tab{flex:1 1 45%;font-size:12.5px;min-height:42px;}
    .info{max-width:calc(100vw - 16px);}
    .player{top:104px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "reactflow": "https://esm.sh/reactflow@11.11.4?deps=react@18.3.1,react-dom@18.3.1&bundle"
  }
}
</script>
<script type="module">
import React, { useMemo, useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import ReactFlow, { Background, Controls, MiniMap, MarkerType, ReactFlowProvider, Handle, Position, useReactFlow } from 'reactflow';
const h = React.createElement;

const N = (id, tag, label, x, y, w, info) => ({ id, tag, label, x, y, w, info });

const NODES = [
  // ── Phase 1: Product planning (one-time / occasional) ────
  N('gather',   'H', 'Gather product info',        400,    0, null, 'Human input. The product owner describes mission, users, and intent. Agent OS turns that into durable planning artifacts — done once per product, revisited rarely.'),
  N('mission',  'S', 'Product mission',            160,  110, null, 'Product artifact (product/mission.md). The "why" — who it serves and what success looks like. Every spec is later checked against this north star.'),
  N('stack',    'S', 'Tech stack',                 400,  110, null, 'Product artifact (product/tech-stack.md). Locked decisions about languages, frameworks, infra. Constrains every downstream spec so agents don\'t reinvent choices.'),
  N('roadmap',  'S', 'Product roadmap',            640,  110, null, 'Product artifact (product/roadmap.md). Ordered list of features. The roadmap is the queue — each item eventually becomes its own dated spec folder.'),

  // ── Phase 2: Specification (per feature) ─────────────────
  N('initSpec', 'W', 'Initialize spec\n(dated folder)', 400, 220, 190, 'Runtime. Creates agent-os/specs/YYYY-MM-DD-name/. Every feature gets its own immutable, dated workspace — the unit of traceability in Agent OS.'),
  N('research', 'A', 'Research spec\n(read code + store)', 140, 330, 180, 'Agent execution. Reads the existing codebase and structural store to ground the spec in reality before a line is written. Spec quality bounds output quality.'),
  N('reqs',     'S', 'requirements.md',            370,  330, null, 'Spec artifact (planning/requirements.md). The captured "what" and constraints, separated from the "how". Reviewed before the spec is written.'),
  N('writeSpec','A', 'Write spec.md',              590,  330, null, 'Agent execution. Produces the spec.md contract: summary, core principle, architecture, scoped behavior. This is the program in Software-3.0 terms.'),
  N('decisions','S', 'decisions.md (ADRs)',        810,  330, 170, 'Spec artifact (planning/decisions.md). Architecture Decision Records captured inline — why this approach, what was rejected. Durable rationale, not chat history.'),
  N('verifySpec','G','Verify spec\n(complete + testable)', 400, 450, 190, 'Gate. verify-spec workflow checks the spec is complete, unambiguous, and testable BEFORE task breakdown. Catches spec defects when they\'re cheapest to fix.'),

  // ── Phase 3: Task breakdown ──────────────────────────────
  N('createTasks','W','Create tasks list',         400,  560, null, 'Runtime. Decomposes the verified spec into an ordered, dependency-aware task list. Bridges "what" (spec) to "do" (implementation).'),
  N('tasks',    'S', 'tasks.md\n(ordered breakdown)', 400, 660, 180, 'Spec artifact (tasks.md). The execution checklist. Each task is independently verifiable; tasks.md is the agent\'s working contract during implementation.'),

  // ── Phase 4: Implementation (orchestration fork) ─────────
  N('orchestrate','W','Orchestration mode',        400,  770, null, 'Runtime fork. Agent OS ships every command in single-agent and multi-agent variants. The orchestrator picks based on task independence and parallelism available.'),
  N('single',   'A', 'Single-agent\nimplement-tasks', 200, 880, 170, 'Agent execution. One agent walks tasks.md sequentially. Simpler, fully ordered, best when tasks share state or the change is small.'),
  N('multi',    'A', 'Multi-agent\nparallel sub-agents', 600, 880, 180, 'Agent execution. Orchestrator fans independent tasks out to parallel sub-agents. Scales throughput when tasks.md has no cross-dependencies.'),
  N('implement','A', 'Implement tasks\n(impl + tests)', 400, 1000, 180, 'Agent execution. Code + tests written against tasks.md and spec.md. Both orchestration modes converge here — the work product is identical, only the path differs.'),
  N('standards','S', 'Compile implementation\nstandards', 700, 1000, 190, 'Spec artifact. compile-implementation-standards distills the actual patterns used into reusable standards — the product\'s own dogfooded output, fed back as guidance.'),

  // ── Phase 5: Verification ────────────────────────────────
  N('runTests', 'G', 'Run all tests',              200, 1120, null, 'Gate. run-all-tests — deterministic check that the implementation is green. First of the verification triad.'),
  N('verifyTasks','G','Verify tasks\n(AC met)',    400, 1120, 170, 'Gate. verify-tasks confirms every task in tasks.md is actually satisfied and acceptance criteria from the spec are met — not just that tests pass.'),
  N('verReport','G', 'Verification report',        600, 1120, null, 'Gate artifact. create-verification-report consolidates test + task results into an auditable record attached to the spec folder. Evidence, not assertion.'),
  N('verGate',  'G', 'Verification gate',          400, 1240, null, 'Gate. AND across the verification triad. Nothing advances to roadmap update until tests pass, tasks verify, and the report is clean.'),

  // ── Phase 6: Outcome split ───────────────────────────────
  N('pass',     'P', 'PASS',                       250, 1350, null, 'Spec verified end-to-end. The increment is real and the roadmap can advance.'),
  N('fail',     'F', 'FAIL',                       580, 1350, null, 'A test, task, or acceptance criterion is unmet. Routes to disposition — never silently dropped.'),

  // ── PASS branch ──────────────────────────────────────────
  N('updateRoadmap','M','Update roadmap',          250, 1460, null, 'Measurement. update-roadmap marks the feature delivered and surfaces the next item. The roadmap is the living source of "what\'s done / what\'s next".'),
  N('ship',     'S', 'Shipped increment',          250, 1570, null, 'Each spec delivers an independently shippable slice. The dated spec folder remains as the permanent record of how and why it was built.'),
  N('nextSpec', 'W', 'Next spec / feature',        400, 1690, null, 'Runtime. Scheduler pulls the next roadmap item and loops back to initialize a fresh dated spec. The outer spec-driven loop.'),

  // ── FAIL branch ──────────────────────────────────────────
  N('findings', 'H', 'Findings:\nfixed / accepted / deferred', 580, 1460, 200, 'Human judgment. Every verification finding reaches a terminal state. Mirrors the project\'s CLAUDE.md rule: "a discovered bug is a stopping point, not a footnote."'),
  N('reviseSpec','S','Revise spec / tasks',        580, 1580, null, 'Spec artifact. The spec or tasks.md — not the code alone — is the primary fix surface. Tighten acceptance criteria, clarify scope, then re-run.'),
  N('reimpl',   'A', 'Agent re-implements\n→ loop back', 580, 1690, 180, 'Agent execution. Re-spawned with the amended spec plus failing findings as context. Loops back into implementation. Same contract, sharper spec.'),

  // ── Async: staleness & skill improvement ─────────────────
  N('staleness','M', 'Check staleness',            860, 1120, null, 'Maintenance (async). check-staleness compares specs/roadmap against the evolving codebase and flags drift — the signal that accumulated specs need revisiting.'),
  N('improveSkills','M','Improve skills /\nstandards', 860, 1240, 170, 'Maintenance (async). improve-skills folds lessons from verification + staleness back into the command/skill library, so the methodology itself compounds over time.'),
];

const E = (id, source, target, label) => ({ id, source, target, label });
const EDGES = [
  // Planning
  E('e1','gather','mission'),
  E('e2','gather','stack'),
  E('e3','gather','roadmap'),
  // Roadmap item → spec
  E('e4','roadmap','initSpec','queue → spec'),
  // Specification
  E('e5','initSpec','research'),
  E('e6','initSpec','reqs'),
  E('e7','research','writeSpec'),
  E('e8','reqs','writeSpec'),
  E('e9','writeSpec','decisions'),
  E('e10','writeSpec','verifySpec'),
  E('e11','decisions','verifySpec'),
  // Tasks
  E('e12','verifySpec','createTasks'),
  E('e13','createTasks','tasks'),
  // Implementation
  E('e14','tasks','orchestrate'),
  E('e15','orchestrate','single'),
  E('e16','orchestrate','multi'),
  E('e17','single','implement'),
  E('e18','multi','implement'),
  E('e19','implement','standards'),
  // Verification
  E('e20','implement','runTests'),
  E('e21','implement','verifyTasks'),
  E('e22','runTests','verReport'),
  E('e23','verifyTasks','verReport'),
  E('e24','verReport','verGate'),
  // Outcome
  E('e25','verGate','pass'),
  E('e26','verGate','fail'),
  // PASS branch
  E('e27','pass','updateRoadmap'),
  E('e28','updateRoadmap','ship'),
  E('e29','ship','nextSpec'),
  E('e30','nextSpec','initSpec','next feature'),
  // FAIL branch
  E('e31','fail','findings'),
  E('e32','findings','reviseSpec'),
  E('e33','reviseSpec','reimpl'),
  E('e34','reimpl','implement','loop back'),
  // Async maintenance
  E('e35','updateRoadmap','staleness','periodic'),
  E('e36','staleness','improveSkills'),
  E('e37','improveSkills','reviseSpec','feeds back'),
];

const S = (label, nodes, edges, focus) => ({ label, nodes, edges, focus });
const SCENARIOS = {
  overview: {
    name:'Overview', sub:'everything',
    desc:'The full Agent OS loop: product planning → spec → tasks → implementation → verification → roadmap. Tap any node to read its role. Pick a scenario, then ▶ Play to step through.',
    steps: null,
  },
  happy: {
    name:'Happy path', sub:'plan → spec → verify → ship',
    desc:'One feature, clean run: roadmap item → dated spec → verified spec → tasks → single-agent implementation → verification triad green → roadmap advances → shipped.',
    steps: [
      S('Gather product info',               ['gather'],   []),
      S('Mission / stack / roadmap',         ['mission','stack','roadmap'], ['e1','e2','e3']),
      S('Roadmap item → initialize spec',    ['initSpec'], ['e4']),
      S('Research codebase + store',         ['research'], ['e5']),
      S('Capture requirements.md',           ['reqs'],     ['e6']),
      S('Write spec.md contract',            ['writeSpec'],['e7','e8']),
      S('Record decisions.md (ADRs)',        ['decisions'],['e9']),
      S('Verify spec — complete & testable', ['verifySpec'],['e10','e11']),
      S('Create tasks list',                 ['createTasks'],['e12']),
      S('tasks.md ordered breakdown',        ['tasks'],    ['e13']),
      S('Orchestration mode',                ['orchestrate'],['e14']),
      S('Single-agent implement-tasks',      ['single'],   ['e15']),
      S('Implement tasks (impl + tests)',    ['implement'],['e17']),
      S('Compile implementation standards',  ['standards'],['e19']),
      S('Run all tests',                     ['runTests'], ['e20']),
      S('Verify tasks — AC met',             ['verifyTasks'],['e21']),
      S('Verification report',               ['verReport'],['e22','e23']),
      S('Verification gate AND-passes',      ['verGate'],  ['e24']),
      S('PASS',                              ['pass'],     ['e25']),
      S('Update roadmap',                    ['updateRoadmap'],['e27']),
      S('Shipped increment',                 ['ship'],     ['e28']),
      S('Next spec / feature',               ['nextSpec'], ['e29']),
    ],
  },
  multi: {
    name:'Multi-agent', sub:'parallel sub-agent execution',
    desc:'Same spec, but tasks.md has independent tasks. The orchestrator fans them out to parallel sub-agents; they converge on a single implementation, then the verification triad runs once.',
    steps: [
      S('Verified spec → tasks.md',          ['verifySpec','createTasks','tasks'], ['e12','e13']),
      S('Orchestration mode',                ['orchestrate'],['e14']),
      S('Multi-agent: parallel sub-agents',  ['multi'],    ['e16']),
      S('Sub-agents converge on implementation', ['implement'], ['e18']),
      S('Compile implementation standards',  ['standards'],['e19']),
      S('Run tests + verify tasks',          ['runTests','verifyTasks'], ['e20','e21']),
      S('Verification report',               ['verReport'],['e22','e23']),
      S('Gate passes',                       ['verGate','pass'], ['e24','e25']),
      S('Roadmap advances',                  ['updateRoadmap'], ['e27']),
    ],
  },
  fail: {
    name:'Verify fail + repair', sub:'finding → revise spec → retry',
    desc:'Tests pass but a task\'s acceptance criterion is unmet. The verification gate trips, the finding is dispositioned, the spec/tasks are revised, the agent re-implements, and attempt 2 is clean.',
    steps: [
      S('Spec verified → tasks → implement', ['verifySpec','createTasks','tasks'], ['e12','e13']),
      S('① Implement tasks',                 ['implement'],['e17']),
      S('① Run all tests — green',           ['runTests'], ['e20']),
      S('① Verify tasks: ✕ AC not met',      ['verifyTasks'],['e21']),
      S('① Verification report flags gap',   ['verReport'],['e22','e23']),
      S('① Verification gate trips',         ['verGate'],  ['e24']),
      S('① FAIL ✕',                          ['fail'],     ['e26']),
      S('① Findings: fixed',                 ['findings'], ['e31']),
      S('① Revise spec / tasks',             ['reviseSpec'],['e32']),
      S('① Agent re-implements',             ['reimpl'],   ['e33']),
      S('↩ Loop back to implementation',     ['implement'],['e34']),
      S('② Verification triad re-runs',      ['runTests','verifyTasks','verReport'], ['e20','e21','e22','e23']),
      S('② Gate passes',                     ['verGate','pass'], ['e24','e25']),
      S('② Update roadmap',                  ['updateRoadmap'],['e27']),
      S('② Shipped',                         ['ship'],     ['e28']),
    ],
  },
  staleness: {
    name:'Staleness loop', sub:'drift → improve → re-spec',
    desc:'Over time the codebase drifts from its specs. check-staleness flags it, improve-skills folds the lesson back into the methodology, and affected specs are revised — the loop that keeps 40 dated specs honest.',
    steps: [
      S('Roadmap updated over many features', ['updateRoadmap'], []),
      S('Check staleness (periodic)',        ['staleness'], ['e35']),
      S('Improve skills / standards',        ['improveSkills'], ['e36']),
      S('Revise affected specs',             ['reviseSpec'],['e37']),
      S('Agent re-implements',               ['reimpl'],   ['e33']),
      S('Loop back to implementation',       ['implement'],['e34']),
      S('Verification triad green',          ['runTests','verifyTasks','verReport'], ['e20','e21','e22','e23']),
      S('Gate passes',                       ['verGate','pass'], ['e24','e25']),
    ],
  },
};

const TAG_COLOR = { H:'#ff8c1a', A:'#b366ff', S:'#3ddc84', G:'#4da6ff', M:'#3dc8d4', W:'#7a8294', F:'#ff5a5f', P:'#3ddc84' };
const TAG_LABEL = {
  H:'H — human / product input',
  A:'A — agent execution',
  S:'S — spec / artifact',
  G:'G — gate / verification',
  M:'M — roadmap / maintenance',
  W:'W — runtime / orchestration',
  F:'fail',
  P:'pass',
};
const TAG_TEXT  = { H:'H', A:'A', S:'S', G:'G', M:'M', W:'rt', F:'FAIL', P:'PASS' };

function FlowNode({ data }) {
  let state = data.state || 'pending';
  const cls = 'node-box node-' + data.tag + ' node-' + state;
  const tagCls = 'node-tag tag-' + data.tag;
  return h('div', { className: cls, style:{ minWidth: data.w || 140 }, onClick:(e)=>{ e.stopPropagation(); data.onSelect(data.nodeId); } },
    h(Handle, { type:'target', position:Position.Top, style:{ background:'#555' } }),
    h('div', { className: tagCls }, TAG_TEXT[data.tag] || data.tag),
    h('div', { className: 'node-label' }, data.label.split('\n').map((l,i)=>h(React.Fragment,{key:i}, i?h('br'):null, l))),
    h(Handle, { type:'source', position:Position.Bottom, style:{ background:'#555' } })
  );
}
const nodeTypes = { flow: FlowNode };

function edgeColor(sourceTag, targetTag) {
  if (sourceTag !== 'W') return TAG_COLOR[sourceTag];
  if (targetTag !== 'W') return TAG_COLOR[targetTag];
  return TAG_COLOR.W;
}

function App() {
  const [scenario, setScenario] = useState('overview');
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1200);
  const [selectedId, setSelectedId] = useState(null);
  const [follow, setFollow] = useState(true);
  const { setCenter } = useReactFlow();
  const sc = SCENARIOS[scenario];
  const hasSteps = !!sc.steps;
  const total = hasSteps ? sc.steps.length : 0;
  const tagById = useMemo(()=> Object.fromEntries(NODES.map(n=>[n.id,n.tag])), []);

  useEffect(() => { setStep(-1); setPlaying(false); }, [scenario]);

  useEffect(() => {
    if (!playing || !hasSteps) return;
    if (step >= total - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep(s => Math.min(total - 1, s + 1)), speed);
    return () => clearTimeout(t);
  }, [playing, step, total, hasSteps, speed]);

  useEffect(() => {
    if (!follow || !hasSteps || step < 0) return;
    const ids = sc.steps[step].nodes || [];
    if (!ids.length) return;
    let sx = 0, sy = 0, n = 0;
    ids.forEach(id => {
      const nd = NODES.find(x => x.id === id);
      if (nd) { sx += nd.x + 80; sy += nd.y + 30; n++; }
    });
    if (n > 0) setCenter(sx/n, sy/n, { duration: 600, zoom: 0.85 });
  }, [step, scenario, follow, hasSteps, setCenter]);

  const { nodeState, edgeState } = useMemo(() => {
    const ns = {}; const es = {};
    if (!hasSteps) {
      NODES.forEach(n => ns[n.id] = 'done');
      EDGES.forEach(e => es[e.id] = 'done');
    } else {
      NODES.forEach(n => ns[n.id] = 'pending');
      EDGES.forEach(e => es[e.id] = 'pending');
      if (step >= 0) {
        for (let i = 0; i < step; i++) {
          (sc.steps[i].nodes || []).forEach(id => ns[id] = 'done');
          (sc.steps[i].edges || []).forEach(id => es[id] = 'done');
        }
        (sc.steps[step].nodes || []).forEach(id => ns[id] = 'active');
        (sc.steps[step].edges || []).forEach(id => es[id] = 'active');
      }
    }
    return { nodeState: ns, edgeState: es };
  }, [scenario, step, hasSteps]);

  const visualNodeState = (id) => {
    if (!hasSteps) return 'visible';
    return nodeState[id];
  };

  const nodes = useMemo(() => NODES.map(n => ({
    id: n.id, type:'flow', position:{ x:n.x, y:n.y },
    data: { tag:n.tag, label:n.label, w:n.w, state: visualNodeState(n.id), nodeId:n.id, onSelect:setSelectedId },
    draggable: true,
  })), [nodeState, hasSteps]);

  const edges = useMemo(() => EDGES.map(e => {
    const st = edgeState[e.id];
    const col = edgeColor(tagById[e.source], tagById[e.target]);
    return {
      id:e.id, source:e.source, target:e.target, label:e.label,
      className: st,
      animated: st === 'active',
      markerEnd:{ type:MarkerType.ArrowClosed, color:col, width:18, height:18 },
      style:{ stroke:col, strokeWidth: st === 'active' ? 3 : (st === 'done' ? 2 : 1.4) },
      labelStyle:{ fill:'#e8ecf3', fontSize:10 },
      labelBgStyle:{ fill:'#1b1f29' }, labelBgPadding:[4,2], labelBgBorderRadius:4,
    };
  }), [edgeState, tagById]);

  const sel = selectedId ? NODES.find(n=>n.id===selectedId) : null;

  const onPlay = () => {
    if (!hasSteps) return;
    if (step >= total - 1) setStep(0);
    else if (step < 0) setStep(0);
    setPlaying(true);
  };
  const onPause = () => setPlaying(false);
  const onReset = () => { setPlaying(false); setStep(-1); };
  const onPrev = () => { setPlaying(false); setStep(s => Math.max(0, (s < 0 ? 0 : s - 1))); };
  const onNext = () => { setPlaying(false); setStep(s => Math.min(total - 1, s + 1)); };

  const progressPct = !hasSteps ? 100 : (step < 0 ? 0 : ((step + 1) / total) * 100);
  const stepLabel = !hasSteps
    ? 'Tap any node to inspect it.'
    : (step < 0 ? 'Ready. Tap ▶ to step through this scenario.' : `${sc.steps[step].label}`);

  return h(React.Fragment, null,
    h('div', { className:'tabs' },
      Object.entries(SCENARIOS).map(([k,v]) =>
        h('button', { key:k, className:'tab' + (k===scenario?' active':''), onClick:()=>{ setScenario(k); setSelectedId(null); } },
          v.name, h('small', null, v.sub)
        )
      )
    ),
    h('div', { className:'player' },
      h('div', { className:'scen-desc' }, sc.desc),
      h('div', { className:'row' },
        playing
          ? h('button', { className:'btn primary', onClick:onPause, disabled:!hasSteps }, '⏸ Pause')
          : h('button', { className:'btn primary', onClick:onPlay, disabled:!hasSteps }, '▶ Play'),
        h('button', { className:'btn', onClick:onPrev, disabled:!hasSteps || step <= 0 }, '⏮'),
        h('button', { className:'btn', onClick:onNext, disabled:!hasSteps || step >= total - 1 }, '⏭'),
        h('button', { className:'btn', onClick:onReset, disabled:!hasSteps || step < 0 }, '⟲'),
        h('select', { value:speed, onChange:(e)=>setSpeed(parseInt(e.target.value,10)) },
          h('option',{value:2000},'0.5×'),
          h('option',{value:1200},'1×'),
          h('option',{value:700}, '2×'),
          h('option',{value:400}, '3×'),
        ),
        h('button', { className:'btn' + (follow?' primary':''), onClick:()=>setFollow(f=>!f), title:'Auto-pan to follow active step' }, follow ? '👁 Follow' : '👁 Off'),
        h('div', { style:{flex:1,minWidth:80} }),
        hasSteps && h('div', { className:'step-label' },
          h('span',{className:'num'}, (step<0?0:step+1) + '/' + total),
          stepLabel
        ),
        !hasSteps && h('div', { className:'step-label' }, stepLabel),
      ),
      h('div', { className:'progress' }, h('div', { style:{ width: progressPct + '%' } }))
    ),
    sel && h('div', { className:'info' },
      h('button',{className:'close',onClick:()=>setSelectedId(null)},'×'),
      h('h4', null,
        h('span',{className:'tag tag-'+sel.tag, style:{background:TAG_COLOR[sel.tag]}}, TAG_TEXT[sel.tag] || sel.tag),
        ' ', sel.label.replace(/\n/g,' ')
      ),
      h('div', { style:{fontSize:11,color:'var(--muted)',marginTop:2} }, TAG_LABEL[sel.tag]),
      h('p', null, sel.info)
    ),
    h('div', { className:'legend' },
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--H)'}}),' H human'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--A)'}}),' A agent'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--S)'}}),' S spec'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--G)'}}),' G verify'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--M)'}}),' M roadmap'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--W)'}}),' rt runtime'),
    ),
    h(ReactFlow, {
      nodes, edges, nodeTypes,
      fitView:true, fitViewOptions:{ padding:0.22 },
      minZoom:0.12, maxZoom:1.5,
      onPaneClick:()=>setSelectedId(null),
      panOnScroll:false, zoomOnPinch:true, panOnDrag:true,
      proOptions:{ hideAttribution:false },
    },
      h(Background, { color:'#2b3142', gap:24, size:1 }),
      h(Controls, { showInteractive:false }),
      h(MiniMap, { pannable:true, zoomable:true, maskColor:'rgba(15,17,23,.7)', nodeColor:(n)=>TAG_COLOR[n.data?.tag] || '#888', style:{ background:'#1b1f29', border:'1px solid var(--border)' } })
    )
  );
}

createRoot(document.getElementById('root')).render(
  h(ReactFlowProvider, null, h(App))
);
</script>
</body>
</html>
