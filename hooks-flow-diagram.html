<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes" />
<title>Orchestration Hooks [B] — Mode, Discovery, Lifecycle</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" />
<style>
  :root {
    --bg:#0f1117; --panel:#1b1f29; --panel2:#252b38; --border:#2e3548;
    --txt:#e8ecf3; --muted:#9aa3b2;
    --RT:#7a8294; --EV:#b366ff; --DIR:#9c6cf5; --SUB:#4da6ff; --ADV:#3ddc84; --BLK:#ffb454; --F:#ff5a5f; --P:#3ddc84; --DI:#ff8c1a;
    --accent:#4da6ff;
  }
  *{box-sizing:border-box}
  html,body,#root{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .tabs{position:absolute;top:8px;left:8px;right:8px;z-index:25;display:flex;gap:6px;flex-wrap:wrap;background:rgba(15,17,23,.85);backdrop-filter:blur(8px);padding:6px;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.45);}
  .tab{flex:1 1 130px;min-height:44px;padding:6px 10px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);font-size:13px;cursor:pointer;text-align:center;font-weight:500;line-height:1.2;}
  .tab:active{transform:scale(.97);}
  .tab.active{background:linear-gradient(180deg,#3a3f52,#2a2f3e);border-color:#5b6480;box-shadow:inset 0 0 0 1px var(--accent);}
  .tab small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px;}

  .player{position:absolute;top:108px;left:8px;right:8px;z-index:24;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);padding:8px 10px;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;gap:6px;}
  .player .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn{min-width:42px;min-height:36px;padding:6px 10px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);font-size:14px;cursor:pointer;font-weight:600;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,#3a86ff,#2c6bd9);border-color:#5b9dff;color:#fff;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .player select{background:var(--panel2);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;}
  .progress{height:6px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border);}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--ADV),var(--SUB),var(--EV));transition:width .4s ease;}
  .step-label{font-size:12.5px;color:var(--txt);line-height:1.35;}
  .step-label .num{color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;margin-right:6px;}
  .scen-desc{font-size:12px;color:var(--muted);line-height:1.35;}

  .legend{position:absolute;bottom:10px;left:8px;z-index:20;background:rgba(15,17,23,.85);backdrop-filter:blur(8px);padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:11.5px;display:flex;gap:8px;flex-wrap:wrap;}
  .legend .chip{display:inline-flex;align-items:center;gap:5px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}

  .info{position:absolute;right:8px;top:8px;z-index:30;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;max-width:300px;font-size:13px;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .info h4{margin:0 0 6px;font-size:14px;display:flex;align-items:center;gap:6px;}
  .info .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;color:#0f1117;}
  .info p{margin:6px 0 0;color:var(--muted);}
  .info code{background:var(--panel2);padding:1px 5px;border-radius:3px;font-size:11.5px;}
  .info .close{position:absolute;top:6px;right:8px;background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;}

  .node-box{padding:8px 10px;border-radius:8px;border:1.5px solid;background:var(--panel);color:var(--txt);font-size:12px;line-height:1.25;min-width:140px;max-width:240px;text-align:center;cursor:pointer;transition:opacity .25s,filter .25s,box-shadow .25s;position:relative;}
  .node-box:hover{filter:brightness(1.15);}
  .node-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px;margin-bottom:4px;color:#0f1117;}
  .node-label{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;}
  .node-sub{font-size:10.5px;color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:3px;}
  .node-RT{border-color:var(--RT);} .tag-RT{background:var(--RT);}
  .node-EV{border-color:var(--EV);} .tag-EV{background:var(--EV);}
  .node-DIR{border-color:var(--DIR);} .tag-DIR{background:var(--DIR);}
  .node-SUB{border-color:var(--SUB);} .tag-SUB{background:var(--SUB);}
  .node-ADV{border-color:var(--ADV);} .tag-ADV{background:var(--ADV);}
  .node-BLK{border-color:var(--BLK);} .tag-BLK{background:var(--BLK);}
  .node-F{border-color:var(--F);} .tag-F{background:var(--F);color:#fff;}
  .node-P{border-color:var(--P);} .tag-P{background:var(--P);}
  .node-DI{border-color:var(--DI);} .tag-DI{background:var(--DI);}
  .node-pending{opacity:.22;}
  .node-active{animation:pulse 1.2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(77,166,255,.7);}
  .node-done{opacity:1;filter:saturate(.85);}
  .node-done::after{content:"✓";position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--P);color:#0f1117;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1;}
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(77,166,255,.55); }
    70%  { box-shadow: 0 0 0 12px rgba(77,166,255,0);   }
    100% { box-shadow: 0 0 0 0   rgba(77,166,255,0);   }
  }
  .react-flow__edge.pending path{stroke-opacity:.18;}
  .react-flow__edge.active path{stroke-width:3px;}
  .react-flow__edge.done path{stroke-opacity:.95;}
  .react-flow__edge.killed path{stroke-dasharray:5 4;}
  .react-flow__attribution{background:transparent!important;color:var(--muted)!important;font-size:10px;}
  @media (max-width:640px){
    .tab{flex:1 1 45%;font-size:12.5px;min-height:42px;}
    .info{max-width:calc(100vw - 16px);}
    .player{top:104px;}
  }
</style>
</head>

// ============================================================

const NODES_BLOCK = [

  N('b_10',    'BLK', '10-route.sh',          380, 200, 180, '@hook-mode: blocking · default · exits 1 because of an internal lookup failure.', 'blocking · 15s'),

const S = (label, nodes, edges) => ({ label, nodes, edges });
const SCENARIOS = {

      S('Event fires',              ['b_rt','b_fire'],   ['b1']),
      S('First subscriber spawns',  ['b_10'],            ['b2']),
      S('Payload piped to stdin',   ['b_pipe'],          ['b3']),
      S('Subscriber exits 1',       ['b_exit1'],         ['b4']),
      S('Mode is blocking → abort event', ['b_abort'],   ['b5']),
      S('Later 20-notify.sh is SKIPPED',  ['b_20'],      ['b7']),
      S('Blocking escalates → abort orchestration', ['b_halt'], ['b6']),
      S('Surface to human / ops',   ['b_human'],         ['b8']),
    ],
  },
  advisory: {
    name:'Advisory fails', sub:'same failure, log + continue',
    desc:'Same exit 1, but @hook-mode: advisory. The failure becomes a log line. Event continues with the next subscriber.',
    steps: [
      S('Event fires',              ['v_rt','v_fire'],   ['v1']),
      S('10-stream-dot.ts runs OK', ['v_10'],            ['v2']),
      S('Next: advisory slack hook',['v_20'],            ['v3']),
      S('curl webhook → 502',       ['v_curl'],          ['v4']),
      S('Subscriber exits 1',       ['v_exit1'],         ['v5']),
      S('Advisory mode → just log', ['v_log'],           ['v6']),
      S('Next subscriber still runs',['v_30'],           ['v7']),
      S('Event completes; run continues', ['v_done'],    ['v8']),
    ],
  },
  directive: {
    name:'Directive', sub:'hook returns reopen-gate',
    desc:'A hook can emit a JSON directive on the first line of stdout to influence runtime behaviour — beyond pass/fail. Useful for compensating drift.',
    steps: [
      S('observer-drift fires (async)', ['d_rt','d_fire'], ['d1']),
      S('10-reopen-gate.sh runs',       ['d_10'],          ['d2']),
      S('Hook writes JSON directive on stdout line 1', ['d_stdout'], ['d3']),
      S('Runtime parses directive',     ['d_parse'],       ['d4']),
      S('Action: reopen-gate',          ['d_gate'],        ['d5']),
      S('Action: cap-override = 5',     ['d_cap'],         ['d6']),
      S('gate-evaluated re-fires',      ['d_eval'],        ['d7']),
      S('Compensating repair task',     ['d_repair'],      ['d8']),
    ],
  },
  timeout: {
    name:'Timeout', sub:'SIGTERM → 5s grace → SIGKILL',
    desc:'A subscriber hangs past its declared @hook-timeout. Runtime sends SIGTERM, waits 5s, then SIGKILL. Mode decides whether this aborts the event.',
    steps: [
      S('Event fires',                   ['t_rt','t_fire'], ['t1']),
      S('30-dashboard.ts spawns',        ['t_10'],          ['t2']),
      S('Subscriber stalls past 15s',    ['t_wait'],        ['t3']),
      S('SIGTERM sent',                  ['t_term'],        ['t4']),
      S('5s grace window',               ['t_grace'],       ['t5']),
      S('Still alive → SIGKILL',         ['t_kill'],        ['t6']),
      S('Failure → mode decides',        ['t_split'],       ['t7']),
      S('If blocking: abort event',      ['t_blk'],         ['t8']),
      S('If advisory: log + continue',   ['t_adv'],         ['t9']),
    ],
  },
};

const TAG_COLOR = { RT:'#7a8294', EV:'#b366ff', DIR:'#9c6cf5', SUB:'#4da6ff', ADV:'#3ddc84', BLK:'#ffb454', F:'#ff5a5f', P:'#3ddc84', DI:'#ff8c1a' };
const TAG_LABEL = {
  RT: 'runtime',
  EV: 'event (B surface)',
  DIR: 'structured directive',
  SUB: 'subscriber',
  ADV: 'advisory subscriber',
  BLK: 'blocking subscriber',
  F:  'fail / halt',
  P:  'pass',
};
const TAG_TEXT  = { RT:'rt', EV:'event', DIR:'directive', SUB:'sub', ADV:'advisory', BLK:'blocking', F:'FAIL', P:'PASS', DI:'dir' };

function FlowNode({ data }) {
  let state = data.state || 'pending';
  const cls = 'node-box node-' + data.tag + ' node-' + state;
  const tagCls = 'node-tag tag-' + data.tag;
  return h('div', { className: cls, style:{ minWidth: data.w || 140 }, onClick:(e)=>{ e.stopPropagation(); data.onSelect(data.nodeId); } },
    h(Handle, { type:'target', position:Position.Top, style:{ background:'#555' } }),
    h('div', { className: tagCls }, TAG_TEXT[data.tag] || data.tag),
    h('div', { className: 'node-label' }, (data.label || '').split('\n').map((l,i)=>h(React.Fragment,{key:i}, i?h('br'):null, l))),
    data.sub ? h('div', { className: 'node-sub' }, data.sub) : null,
    h(Handle, { type:'source', position:Position.Bottom, style:{ background:'#555' } })
  );
}
const nodeTypes = { flow: FlowNode };

function edgeColor(kind, sourceTag, targetTag) {
  if (kind === 'fail') return '#ff5a5f';
  if (kind === 'killed') return '#ff8c1a';
  if (sourceTag === 'EV' || targetTag === 'EV') return '#b366ff';
  if (sourceTag === 'DIR' || targetTag === 'DIR') return '#9c6cf5';
  if (sourceTag === 'BLK' || targetTag === 'BLK') return '#ffb454';
  if (sourceTag === 'ADV' || targetTag === 'ADV') return '#3ddc84';
  if (sourceTag === 'P' || targetTag === 'P') return '#3ddc84';
  if (sourceTag === 'F' || targetTag === 'F') return '#ff5a5f';
  return '#7a8294';
}

function App() {
  const [scenario, setScenario] = useState('overview');
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1200);
  const [selectedId, setSelectedId] = useState(null);
  const [follow, setFollow] = useState(true);
  const { setCenter } = useReactFlow();

  const sc = SCENARIOS[scenario];
  const view = VIEWS[scenario];
  const NODES = view.nodes;
  const EDGES = view.edges;
  const hasSteps = !!sc.steps;
  const total = hasSteps ? sc.steps.length : 0;
  const tagById = useMemo(()=> Object.fromEntries(NODES.map(n=>[n.id,n.tag])), [NODES]);

  useEffect(() => { setStep(-1); setPlaying(false); setSelectedId(null); }, [scenario]);

  useEffect(() => {
    if (!playing || !hasSteps) return;
    if (step >= total - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep(s => Math.min(total - 1, s + 1)), speed);
    return () => clearTimeout(t);
  }, [playing, step, total, hasSteps, speed]);

  useEffect(() => {
    if (!follow || !hasSteps || step < 0) return;
    const ids = sc.steps[step].nodes || [];
    if (!ids.length) return;
    let sx = 0, sy = 0, n = 0;
    ids.forEach(id => {
      const nd = NODES.find(x => x.id === id);
      if (nd) { sx += nd.x + 90; sy += nd.y + 35; n++; }
    });
    if (n > 0) setCenter(sx/n, sy/n, { duration: 600, zoom: 0.9 });
  }, [step, scenario, follow, hasSteps, setCenter, NODES, sc]);

  const { nodeState, edgeState } = useMemo(() => {
    const ns = {}; const es = {};
    if (!hasSteps) {
      NODES.forEach(n => ns[n.id] = 'done');
      EDGES.forEach(e => es[e.id] = 'done');
    } else {
      NODES.forEach(n => ns[n.id] = 'pending');
      EDGES.forEach(e => es[e.id] = 'pending');
      if (step >= 0) {
        for (let i = 0; i < step; i++) {
          (sc.steps[i].nodes || []).forEach(id => ns[id] = 'done');
          (sc.steps[i].edges || []).forEach(id => es[id] = 'done');
        }
        (sc.steps[step].nodes || []).forEach(id => ns[id] = 'active');
        (sc.steps[step].edges || []).forEach(id => es[id] = 'active');
      }
    }
    return { nodeState: ns, edgeState: es };
  }, [scenario, step, hasSteps, NODES, EDGES, sc]);

  const visualNodeState = (id) => hasSteps ? nodeState[id] : 'visible';

  const nodes = useMemo(() => NODES.map(n => ({
    id: n.id, type:'flow', position:{ x:n.x, y:n.y },
    data: { tag:n.tag, label:n.label, sub:n.sub, w:n.w, state: visualNodeState(n.id), nodeId:n.id, onSelect:setSelectedId },
    draggable: true,
  })), [nodeState, hasSteps, NODES]);

  const edges = useMemo(() => EDGES.map(e => {
    const st = edgeState[e.id];
    const col = edgeColor(e.kind, tagById[e.source], tagById[e.target]);
    let cls = st;
    if (e.kind === 'killed') cls += ' killed';
    return {
      id:e.id, source:e.source, target:e.target, label:e.label,
      className: cls,
      animated: st === 'active',
      markerEnd:{ type:MarkerType.ArrowClosed, color:col, width:18, height:18 },
      style:{ stroke:col, strokeWidth: st === 'active' ? 3 : (st === 'done' ? 2 : 1.4) },
      labelStyle:{ fill:'#e8ecf3', fontSize:10 },
      labelBgStyle:{ fill:'#1b1f29' }, labelBgPadding:[4,2], labelBgBorderRadius:4,
    };
  }), [edgeState, EDGES, tagById]);

  const sel = selectedId ? NODES.find(n=>n.id===selectedId) : null;

  const onPlay = () => {
    if (!hasSteps) return;
    if (step >= total - 1) setStep(0);
    else if (step < 0) setStep(0);
    setPlaying(true);
  };
  const onPause = () => setPlaying(false);
  const onReset = () => { setPlaying(false); setStep(-1); };
  const onPrev = () => { setPlaying(false); setStep(s => Math.max(0, (s < 0 ? 0 : s - 1))); };
  const onNext = () => { setPlaying(false); setStep(s => Math.min(total - 1, s + 1)); };

  const progressPct = !hasSteps ? 100 : (step < 0 ? 0 : ((step + 1) / total) * 100);
  const stepLabel = !hasSteps
    ? 'Tap any node to inspect it.'
    : (step < 0 ? 'Ready. Tap ▶ to step through this scenario.' : `${sc.steps[step].label}`);

  return h(React.Fragment, null,
    h('div', { className:'tabs' },
      Object.entries(SCENARIOS).map(([k,v]) =>
        h('button', { key:k, className:'tab' + (k===scenario?' active':''), onClick:()=>setScenario(k) },
          v.name, h('small', null, v.sub)
        )
      )
    ),
    h('div', { className:'player' },
      h('div', { className:'scen-desc' }, sc.desc),
      h('div', { className:'row' },
        playing
          ? h('button', { className:'btn primary', onClick:onPause, disabled:!hasSteps }, '⏸ Pause')
          : h('button', { className:'btn primary', onClick:onPlay, disabled:!hasSteps }, '▶ Play'),
        h('button', { className:'btn', onClick:onPrev, disabled:!hasSteps || step <= 0 }, '⏮'),
        h('button', { className:'btn', onClick:onNext, disabled:!hasSteps || step >= total - 1 }, '⏭'),
        h('button', { className:'btn', onClick:onReset, disabled:!hasSteps || step < 0 }, '⟲'),
        h('select', { value:speed, onChange:(e)=>setSpeed(parseInt(e.target.value,10)) },
          h('option',{value:2000},'0.5×'),
          h('option',{value:1200},'1×'),
          h('option',{value:700}, '2×'),
          h('option',{value:400}, '3×'),
        ),
        h('button', { className:'btn' + (follow?' primary':''), onClick:()=>setFollow(f=>!f), title:'Auto-pan to follow active step' }, follow ? '👁 Follow' : '👁 Off'),
        h('div', { style:{flex:1,minWidth:80} }),
        hasSteps && h('div', { className:'step-label' },
          h('span',{className:'num'}, (step<0?0:step+1) + '/' + total),
          stepLabel
        ),
        !hasSteps && h('div', { className:'step-label' }, stepLabel),
      ),
      h('div', { className:'progress' }, h('div', { style:{ width: progressPct + '%' } }))
    ),
    sel && h('div', { className:'info' },
      h('button',{className:'close',onClick:()=>setSelectedId(null)},'×'),
      h('h4', null,
        h('span',{className:'tag', style:{background:TAG_COLOR[sel.tag],color:'#0f1117'}}, TAG_TEXT[sel.tag] || sel.tag),
        ' ', (sel.label || '').replace(/\n/g,' ')
      ),
      h('div', { style:{fontSize:11,color:'var(--muted)',marginTop:2} }, TAG_LABEL[sel.tag]),
      sel.sub ? h('p', null, h('code', null, sel.sub)) : null,
      sel.info ? h('p', null, sel.info) : null,
    ),
    h('div', { className:'legend' },
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--EV)'}}),' event'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--BLK)'}}),' blocking sub'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--ADV)'}}),' advisory sub'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--DIR)'}}),' directive'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--RT)'}}),' runtime'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--F)'}}),' fail/halt'),
      h('span',{className:'chip'}, h('span',{className:'dot',style:{background:'var(--P)'}}),' pass'),
    ),
    h(ReactFlow, {
      nodes, edges, nodeTypes,
      fitView:true, fitViewOptions:{ padding:0.22 },
      minZoom:0.15, maxZoom:1.5,
      onPaneClick:()=>setSelectedId(null),
      panOnScroll:false, zoomOnPinch:true, panOnDrag:true,
      proOptions:{ hideAttribution:false },
    },
      h(Background, { color:'#2b3142', gap:24, size:1 }),
      h(Controls, { showInteractive:false }),
      h(MiniMap, { pannable:true, zoomable:true, maskColor:'rgba(15,17,23,.7)', nodeColor:(n)=>TAG_COLOR[n.data?.tag] || '#888', style:{ background:'#1b1f29', border:'1px solid var(--border)' } })
    )
  );
}

createRoot(document.getElementById('root')).render(
  h(ReactFlowProvider, null, h(App))
);
</script>
</body>
</html>
